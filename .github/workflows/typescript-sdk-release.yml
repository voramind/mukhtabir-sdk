name: Publish TypeScript SDK

on:
  push:
    tags:
      - "typescript-sdk-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: typescript

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Verify tagged commit is on main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main

          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tagged commit $GITHUB_SHA is not reachable from origin/main."
            exit 1
          fi

      - name: Verify tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#typescript-sdk-v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package version $PACKAGE_VERSION."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run type checks
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Run package smoke
        run: npm run test:package

      - name: Run live integration tests
        env:
          MUKHTABIR_INTEGRATION: "1"
          MUKHTABIR_API_KEY: ${{ secrets.MUKHTABIR_API_KEY }}
          MUKHTABIR_BASE_URL: ${{ secrets.MUKHTABIR_BASE_URL }}
        run: npm run test:integration:live

      - name: Pack release artifact
        id: pack
        run: |
          mkdir -p ../release-artifacts
          TARBALL="$(
            npm pack --json --pack-destination ../release-artifacts \
              | node -e 'let data = ""; process.stdin.on("data", (chunk) => { data += chunk; }); process.stdin.on("end", () => { console.log(JSON.parse(data)[0].filename); });'
          )"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: typescript-sdk-package
          path: release-artifacts/${{ steps.pack.outputs.tarball }}
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: npm-release
      url: https://www.npmjs.com/package/@mukhtabir/sdk
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download release artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: typescript-sdk-package
          path: release-artifacts

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ./release-artifacts/*.tgz --access public --provenance
